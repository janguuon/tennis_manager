# 테니스 매니저 Docker 배포.
# 백엔드(FastAPI)와 프론트(Remix)를 컨테이너로 띄우고, 기존 nginx_proxy와 같은
# 외부 네트워크(usuniverse_app-network)에 붙여 nginx_proxy가 컨테이너 이름으로 프록시한다.
#
# 사전: 같은 폴더에 .env 파일 생성 (SECRET_KEY, SESSION_SECRET)
#   SECRET_KEY=...        # python3 -c "import secrets; print(secrets.token_hex(32))"
#   SESSION_SECRET=...    # openssl rand -hex 32

services:
  tennis-backend:
    build: ./backend
    container_name: tennis-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/tennismanager.db
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
    volumes:
      - tennis-data:/app/data   # SQLite 영속
    networks:
      - usuniverse

  tennis-frontend:
    build: ./frontend
    container_name: tennis-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "5555"
      API_URL: http://tennis-backend:5005   # 같은 네트워크에서 백엔드 호출
    depends_on:
      - tennis-backend
    ports:
      - "127.0.0.1:5555:5555"   # 로컬 디버깅용(외부 비공개). nginx는 네트워크로 접근
    networks:
      - usuniverse

volumes:
  tennis-data:

networks:
  usuniverse:
    external: true
    name: usuniverse_app-network
