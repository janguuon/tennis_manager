# /etc/nginx/sites-available/tennismanager 에 배치 후
# /etc/nginx/sites-enabled/ 로 심볼릭 링크.
# server_name 을 본인 도메인(또는 Lightsail 공인 IP)으로 바꾸세요.

server {
    listen 80;
    server_name 13.125.173.69.sslip.io;   # 공인 IP 기반 무료 HTTPS (sslip.io)

    # 업로드/요청 본문 크기 여유
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:5555;   # Remix 프론트엔드
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# 참고: 백엔드(FastAPI, 5005)는 외부로 열지 않습니다.
# Remix가 서버 내부에서 127.0.0.1:5005 으로만 호출하기 때문입니다.
