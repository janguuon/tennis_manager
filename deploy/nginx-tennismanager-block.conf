# 기존 nginx_proxy 설정(/home/ubuntu/UsUniverse/nginx/nginx.conf)의 http { ... } 안에
# 아래 두 server 블록을 추가한다. (테니스 매니저용, sslip.io + tennis-frontend:5555)
#
# 순서 주의:
#   1) 먼저 "80 블록"만 추가하고 nginx reload → certbot으로 인증서 발급
#   2) 인증서가 생긴 뒤 "443 블록" 추가하고 다시 reload
#   (443 블록은 인증서 파일이 없으면 nginx 起動 실패)

# --- 80: ACME 챌린지 + HTTPS 리다이렉트 ---
server {
    listen 80;
    server_name 13.125.173.69.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://13.125.173.69.sslip.io$request_uri;
    }
}

# --- 443: 테니스 매니저 (frontend 컨테이너로 프록시) ---
server {
    listen 443 ssl;
    server_name 13.125.173.69.sslip.io;
    resolver 127.0.0.11 valid=30s;

    ssl_certificate     /etc/letsencrypt/live/13.125.173.69.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13.125.173.69.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        set $tennis tennis-frontend;
        proxy_pass http://$tennis:5555;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
